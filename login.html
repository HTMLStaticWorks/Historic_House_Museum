<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Historic House Museum</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="shortcut icon" href="assets/images/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23722F37'/%3E%3Ctext x='50' y='65' font-family='Inter,Arial,sans-serif' font-size='55' fill='%23ffffff' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('assets/images/hero-home.png');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>

    <div class="position-fixed top-0 end-0 p-3 z-3 d-flex gap-2">
        <button class="glow-toggle text-white" id="rtl-toggle" title="Toggle RTL">
            <span>RTL</span>
        </button>
        <button class="glow-toggle text-white" id="theme-toggle" title="Toggle Theme">
            <i class="bi bi-sun-fill"></i>
        </button>
    </div>

    <div class="auth-wrapper p-3">
        <div class="custom-card shadow-lg p-5" style="max-width: 450px; width: 100%;">
            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand d-inline-flex align-items-center mb-3">
                    <i class="bi bi-house-door-fill text-primary me-2 fs-3"></i>
                    <span class="fw-bold fs-4 font-heading">HISTORIC<span class="text-primary">HOUSE</span></span>
                </a>
                <h4 class="fw-bold">Welcome Back</h4>
                <p class="text-muted small">Sign in to manage your museum membership.</p>
            </div>

            <form class="needs-validation" novalidate action="dashboard.html">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="loginPassword" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="const p=document.getElementById('loginPassword');const i=this.querySelector('i');if(p.type==='password'){p.type='text';i.classList.replace('bi-eye','bi-eye-slash');}else{p.type='password';i.classList.replace('bi-eye-slash','bi-eye');}">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="login-meta-row d-flex justify-content-between align-items-center gap-3 mt-2 flex-wrap">
                        <div class="form-check mb-0">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label small" for="remember">Remember me for 30 days</label>
                        </div>
                        <a href="#" class="small text-primary text-nowrap">Forgot password?</a>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">Sign In</button>

                <div class="position-relative my-4">
                    <hr class="text-muted">
                    <span class="position-absolute top-50 start-50 translate-middle bg-card-custom px-3 small text-muted fw-bold">OR</span>
                </div>

                <button type="button" class="btn btn-outline-dark w-100 d-flex align-items-center justify-content-center gap-2 py-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-google" viewBox="0 0 16 16">
                        <path d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0c2.182 0 4.036.815 5.447 2.138L11.31 4.28a3.956 3.956 0 0 0-3.31-1.74c-2.193 0-3.974 1.781-3.974 3.974S5.807 10.5 8 10.5c2.447 0 3.92-1.578 4.08-3.941H8.16v-3.04h7.385z"/>
                    </svg>
                    <span class="fw-bold">Continue with Google</span>
                </button>

                <button type="button" class="btn btn-dark w-100 d-flex align-items-center justify-content-center gap-2 py-2 mt-2">
                    <i class="bi bi-apple fs-5"></i>
                    <span class="fw-bold">Continue with Apple</span>
                </button>
            </form>

            <div class="text-center mt-4 pt-3 border-top">
                <p class="text-muted small mb-0">Don't have an account? <a href="register.html" class="fw-bold text-primary">Join the Society</a></p>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
