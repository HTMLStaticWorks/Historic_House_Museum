<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Historic House Museum</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .error-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: var(--bg-color);
        }
        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 15rem;
            line-height: 1;
            opacity: 0.1;
            position: absolute;
            z-index: 0;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <div class="error-wrapper p-3">
        <div class="error-code">404</div>
        <div class="position-relative z-1">
            <i class="bi bi-clock-history text-primary display-1 mb-4"></i>
            <h1 class="display-3 fw-bold mb-3">Lost in Time</h1>
            <p class="lead text-muted mb-5">The page you are looking for has been archived by history <br> or moved to a different wing of the museum.</p>
            <div class="d-flex justify-content-center gap-3 mb-5">
                <a href="index.html" class="btn btn-primary btn-lg px-5">Back Home</a>
                <a href="contact.html" class="btn btn-outline-primary btn-lg px-5">Help Desk</a>
            </div>
            <div>
                <p class="text-muted small">
                    <a href="#" class="text-muted text-decoration-none me-3">Service Policy</a>
                    <a href="#" class="text-muted text-decoration-none">Terms of Service</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
