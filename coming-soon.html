<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Historic House Museum</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .soon-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/images/hero-home2.png');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }
        .countdown-item {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 8px;
            min-width: 120px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <div class="soon-wrapper p-3">
        <div class="container">
            <a class="d-inline-flex align-items-center mb-5 text-white" href="index.html">
                <i class="bi bi-house-door-fill text-secondary fs-1 me-2"></i>
                <span class="fw-bold fs-2 font-heading">HISTORIC<span class="text-secondary">HOUSE</span></span>
            </a>
            <h1 class="display-2 fw-bold mb-4">A New Era is <span class="text-secondary">Approaching</span></h1>
            <p class="lead mb-5 px-lg-5">We are currently restoring the Sterling Digital Archive. Our new immersive collection will be available soon.</p>
            
            <div class="d-flex justify-content-center gap-3 mb-5">
                <div class="countdown-item">
                    <h2 class="fw-bold mb-0">14</h2>
                    <span class="small text-uppercase">Days</span>
                </div>
                <div class="countdown-item">
                    <h2 class="fw-bold mb-0">21</h2>
                    <span class="small text-uppercase">Hours</span>
                </div>
                <div class="countdown-item">
                    <h2 class="fw-bold mb-0">45</h2>
                    <span class="small text-uppercase">Mins</span>
                </div>
            </div>

            <div class="row justify-content-center">
                <div class="col-md-6">
                    <h6 class="mb-4">Notify me when we open the doors</h6>
                    <form class="input-group mb-3 needs-validation" novalidate>
                        <input type="email" class="form-control" placeholder="Email Address" required>
                        <button class="btn btn-secondary px-4" type="submit">Notify Me</button>
                    </form>
                </div>
            </div>

            <div class="mt-5">
                <div class="d-flex justify-content-center gap-4 mb-4">
                    <a href="#" class="text-white fs-4"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="text-white fs-4"><i class="bi bi-instagram"></i></a>
                    <a href="#" class="text-white fs-4"><i class="bi bi-twitter-x"></i></a>
                </div>
                <p class="text-white-50 small">
                    <a href="#" class="text-white-50 text-decoration-none me-3">Service Policy</a>
                    <a href="#" class="text-white-50 text-decoration-none">Terms of Service</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
